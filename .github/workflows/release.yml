name: Release

on:
  push:
    tags:
      - 'v*'          # se dispara con v1.0.0, v2.1.3, etc.

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # necesario para crear releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true   # auto-genera notas desde los commits
